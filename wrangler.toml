name = "portfolio"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

# Note: This project uses `@astrojs/cloudflare` (Workers runtime). Keeping this as a Workers project
# avoids Cloudflare Pages' reserved `ASSETS` binding name, which otherwise causes `astro build` to fail.

# Secrets (set via `wrangler secret put RESEND_API_KEY`):
# - RESEND_API_KEY: API key for Resend email service (used by /api/contact)

[[ratelimits]]
name = "CONTACT_RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 5
  period = 60

[observability]
enabled = true